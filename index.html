<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link href="./output.css" rel="stylesheet" />

    <title>Frontend Mentor | Interactive rating component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body class="font-overpass">
    <!-- Rating state start -->
    <form>
      <header>
        <img src="./images/icon-star.svg" />
      </header>
      <fieldset>
        <legend>How did we do?</legend>
        <p>
          Please let us know how we did with your support request. All feedback
          is appreciated to help us improve our offering!
        </p>
        <label for="rating-1">
          <input type="radio" id="rating-1" name="rating" value="1" />
          1
        </label>
        <label for="rating-2">
          <input type="radio" id="rating-2" name="rating" value="2" />
          2
        </label>
        <label for="rating-3">
          <input type="radio" id="rating-3" name="rating" value="3" />
          3
        </label>
        <label for="rating-4">
          <input type="radio" id="rating-4" name="rating" value="4" />
          4
        </label>
        <label for="rating-5">
          <input type="radio" id="rating-5" name="rating" value="5" />
          5
        </label>
      </fieldset>
      <button>Submit</button>
    </form>

    <!-- Rating state end -->

    <!-- Thank you state start -->

    <!-- You selected -->
    <!-- Add rating here -->
    <!-- out of 5 Thank you! We appreciate you taking the time to give a rating. If
    you ever need more support, don’t hesitate to get in touch! -->

    <!-- Thank you state end -->

    <!-- <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">CJ Kim</a>.
    </footer> -->
  </body>
</html>
